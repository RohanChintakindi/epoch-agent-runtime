[workspace]
members = [
    "crates/epoch-blob",
    "crates/epoch-cli",
    "crates/epoch-core",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
rust-version = "1.85"

[workspace.dependencies]
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
sha2 = "0.10"
serde_json = "1.0"
tempfile = "3.23"
thiserror = "2.0"
uuid = { version = "1.18", features = ["serde", "v4"] }

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
